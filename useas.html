<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download USEAS App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        /* Updated to a clean, modern white/light-gray background gradient */
        background: linear-gradient(135deg, #ffffff, #f1f5f9);
        display: flex;
        justify-content: center;
        align-items: center;
        color: #1e293b; /* Changed to dark text for contrast against white */
    }

    .card {
        /* Adjusted glassmorphism background and borders to stand out cleanly on white */
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px); 
        border: 1px solid rgba(226, 232, 240, 0.8);
        border-radius: 25px;
        padding: 40px 25px;
        width: 320px;
        text-align: center;
        /* Softer, more professional shadow for light mode */
        box-shadow: 0 10px 30px rgba(148, 163, 184, 0.2);
        animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .logo {
        width: 120px;
        border-radius: 20px;
        margin-bottom: 15px;
        box-shadow: 0 5px 15px rgba(148, 163, 184, 0.3);
    }

    h1 {
        font-size: 22px;
        margin-bottom: 10px;
        color: #0f172a;
    }

    p {
        font-size: 14px;
        color: #64748b; /* Accessible muted text color */
        margin-bottom: 25px;
    }

    .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 14px;
        margin: 10px 0;
        border-radius: 15px;
        text-decoration: none;
        font-size: 16px;
        font-weight: 500;
        transition: 0.3s;
        cursor: pointer;
    }

    .android {
        background: linear-gradient(135deg, #00c853, #64dd17);
        color: white;
        box-shadow: 0 5px 15px rgba(0, 200, 83, 0.3);
    }

    .android:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 22px rgba(0, 200, 83, 0.5);
    }

    .windows {
        /* Darker border and text so the button is completely clear against the white theme */
        background: rgba(241, 245, 249, 0.8);
        color: #334155;
        border: 1px solid rgba(203, 213, 225, 1);
    }

    .windows:hover {
        transform: scale(1.05);
        background: rgba(226, 232, 240, 1);
    }

    .coming {
        margin-top: 15px;
        font-size: 13px;
        color: #94a3b8;
    }

    .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #94a3b8;
    }
</style>
</head>

<body>

<div class="card">

    <img src="https://file.garden/aZ1i9e6aIVfqSsYT/ChatGPT%20Image%20Jun%208%2C%202026%2C%2003_29_39%20PM.png" class="logo" alt="USEAS Logo">

    <h1>USEAS App</h1>
    <p>Fast • Simple • Powerful tools in one place</p>

    <a href="https://bit.ly/useaslite" class="btn android" target="_blank" rel="noopener noreferrer">
        📱 Download for Android
    </a>

    <div class="btn windows" onclick="comingSoon()">
        💻 Download for Windows
    </div>

    <div class="coming">Windows version coming soon</div>

    <div class="footer">© 2026 USEAS</div>

</div>

<script>
function comingSoon() {
    alert("Windows version is coming soon!");
}
</script>

</body>
</html>
